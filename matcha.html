<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Matcha Mode: a calming matcha corner with live-updating recipes, cozy discovery, and a signature pour interaction."
    />
    <title>Matcha Mode</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="matcha-body">
    <div class="page-shell">
      <header class="article-header">
        <a class="back-link" href="./index.html">Home</a>
        <div class="article-title-block">
          <h1>Matcha Mode</h1>
          <p class="article-subtitle">
            A small corner for calm, comfort, and new matcha things to try.
          </p>
        </div>
      </header>

      <main>
        <section class="hero panel matcha-hero">
          <div class="hero-copy">
            <h2>Fresh matcha ideas, kept light and easy to browse.</h2>
            <div class="hero-actions">
              <a class="primary-link" href="#recipes">Browse recipes</a>
            </div>
          </div>

          <div class="hero-visual panel-subsection matcha-side-panel">
            <div class="matcha-fact-card">
              <p class="hero-stat-label">Matcha Facts</p>
              <div class="matcha-facts-list" id="matchaFactsList"></div>
              <p class="hero-stat-detail">Updates every day.</p>
            </div>
          </div>
        </section>

        <section class="section-block" id="recipes">
          <div class="section-heading">
            <div>
              <h3>Live Matcha Recipes</h3>
            </div>
          </div>

          <div class="news-status" id="matchaStatus">Loading fresh matcha recipes...</div>
          <div class="matcha-grid" id="matchaGrid"></div>
        </section>
      </main>
    </div>

    <div class="matcha-pour-dock">
      <div class="matcha-cup" id="matchaCup" aria-hidden="true">
        <span class="cup-rim"></span>
        <span class="cup-ice ice-one"></span>
        <span class="cup-ice ice-two"></span>
        <span class="cup-ice ice-three"></span>
        <span class="cup-fill"></span>
        <span class="cup-straw"></span>
      </div>
      <button class="matcha-fab" id="pourButton" type="button">Pour matcha</button>
    </div>

    <script type="module" src="./src/matcha-page.js"></script>
  </body>
</html>
